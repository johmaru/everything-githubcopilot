#:schema https://developers.openai.com/codex/config-schema.json

# Everything GitHub Copilot — Codex Reference Configuration
#
# Copy this file to ~/.codex/config.toml for global defaults, or keep it in
# the project root as .codex/config.toml for project-local settings.
#
# Official docs:
# - https://developers.openai.com/codex/config-reference
# - https://developers.openai.com/codex/multi-agent

# Model selection
# Leave `model` and `model_provider` unset so Codex CLI uses its current
# built-in defaults. Uncomment and pin them only if you intentionally want
# repo-local or global model overrides.

# Top-level runtime settings (current Codex schema)
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

# External notifications receive a JSON payload on stdin.
# Keep project-local defaults cross-platform. macOS users can opt into:
# notify = [
#   "terminal-notifier",
#   "-title", "Codex ECC",
#   "-message", "Task completed!",
#   "-sound", "default",
# ]

# Prefer the root AGENTS.md for project instructions.
# model_instructions_file replaces built-in instructions and AGENTS.md,
# so leave it unset unless you intentionally want a single override file.
# model_instructions_file = "/absolute/path/to/instructions.md"

# MCP servers
# The shipped project default is local-first: hooks, rules, agents, skills, and
# sandbox policy work without network-backed MCP services. Enable heavier MCP
# servers in ~/.codex/config.toml or by uncommenting the blocks below for a
# specific project.
#
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
#
# [mcp_servers.context7]
# command = "npx"
# args = ["-y", "@upstash/context7-mcp@latest"]
#
# [mcp_servers.exa]
# url = "https://mcp.exa.ai/mcp"
#
# [mcp_servers.memory]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-memory"]
#
# [mcp_servers.playwright]
# command = "npx"
# args = ["-y", "@playwright/mcp@latest", "--extension"]
#
# [mcp_servers.sequential-thinking]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

# Additional MCP servers (uncomment as needed):
# [mcp_servers.supabase]
# command = "npx"
# args = ["-y", "supabase-mcp-server@latest", "--read-only"]
#
# [mcp_servers.firecrawl]
# command = "npx"
# args = ["-y", "firecrawl-mcp"]
#
# [mcp_servers.fal-ai]
# command = "npx"
# args = ["-y", "fal-ai-mcp-server"]
#
# [mcp_servers.cloudflare]
# command = "npx"
# args = ["-y", "@cloudflare/mcp-server-cloudflare"]

[features]
# Codex multi-agent support is experimental as of March 2026.
multi_agent = true
# Enable experimental hooks. Codex builds that include openai/codex PR #18391
# emit PreToolUse/PostToolUse for apply_patch as well as Bash.
codex_hooks = true

# Profiles — switch with `codex -p <name>`
[profiles.minimal]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[profiles.full]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

# --- Core agents (4) ---

[agents.planner]
description = "Strategic planning and analysis before implementation."
config_file = "agents/planner.toml"

[agents.coder]
description = "Implementation and verification with mandatory verification loops."
config_file = "agents/coder.toml"

[agents.researcher]
description = "Read-only codebase investigation subagent for dependency tracing and architecture analysis."
config_file = "agents/researcher.toml"

[agents.supporter]
description = "Safe support without file edits. Clarifies requirements and advises before implementation."
config_file = "agents/supporter.toml"

# --- Specialist agents (17) ---

[agents.architect]
description = "Architecture review, trade-off analysis, and system design guidance."
config_file = "agents/architect.toml"

[agents.tdd_guide]
description = "Write-tests-first workflow for implementing or fixing scripts and validators."
config_file = "agents/tdd-guide.toml"

[agents.code_reviewer]
description = "Review correctness, loading behavior, security, and maintainability after changes."
config_file = "agents/code-reviewer.toml"

[agents.security_reviewer]
description = "Review for secrets, unsafe commands, injection risks, and security issues."
config_file = "agents/security-reviewer.toml"

[agents.build_error_resolver]
description = "Fix build failures, type errors, and import errors with minimal diffs."
config_file = "agents/build-error-resolver.toml"

[agents.e2e_runner]
description = "Generate, update, or run end-to-end tests for critical user journeys."
config_file = "agents/e2e-runner.toml"

[agents.refactor_cleaner]
description = "Identify dead code and unused dependencies for safe removal."
config_file = "agents/refactor-cleaner.toml"

[agents.safety_checker]
description = "Post-edit safety inspection for high-risk changes with backup creation."
config_file = "agents/safety-checker.toml"

[agents.agent_auditor]
description = "Audit agent definition files for structural integrity and consistency."
config_file = "agents/agent-auditor.toml"

[agents.best_practice_researcher]
description = "Research best practices before implementation with source attribution."
config_file = "agents/best-practice-researcher.toml"

[agents.code_structure_auditor]
description = "Audit structural integrity: imports, cross-references, file sizes, JSON validity."
config_file = "agents/code-structure-auditor.toml"

[agents.design_coherence_auditor]
description = "Check whether schemas and types support their stated purpose."
config_file = "agents/design-coherence-auditor.toml"

[agents.docs_lookup]
description = "Answer documentation questions from live sources instead of memory."
config_file = "agents/docs-lookup.toml"

[agents.go_reviewer]
description = "Review Go changes for idiomatic patterns, concurrency safety, and security."
config_file = "agents/go-reviewer.toml"

[agents.knowledge_curator]
description = "Capture session learnings and maintain the knowledge base."
config_file = "agents/knowledge-curator.toml"

[agents.python_reviewer]
description = "Review Python changes for security, type hints, and Pythonic patterns."
config_file = "agents/python-reviewer.toml"

[agents.typescript_reviewer]
description = "Review TypeScript/JavaScript changes for type safety, async correctness, and security."
config_file = "agents/typescript-reviewer.toml"
